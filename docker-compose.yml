services:
  mk-payments:
    build: ./
    container_name: mk-payments
    ports:
      - "8081:8080"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://techcup:techcup@mongodb:27017/techcup_payments?authSource=admin
    depends_on:
      - mongodb
    restart: on-failure

  mongodb:
    image: mongo:7.0
    container_name: docker-payments-mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: techcup
      MONGO_INITDB_ROOT_PASSWORD: techcup
      MONGO_INITDB_DATABASE: techcup_payments
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:

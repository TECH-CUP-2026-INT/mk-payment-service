services:
  mk-payments:
    build: ./
    container_name: mk-payments
    ports:
      - "5624:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/techcup_payments
      SPRING_DATASOURCE_USERNAME: techcup
      SPRING_DATASOURCE_PASSWORD: techcup
      MP_ACCESS_TOKEN_DEV: ${MP_ACCESS_TOKEN_DEV}
      MP_PUBLIC_KEY_DEV: ${MP_PUBLIC_KEY_DEV}
      MP_NOTIFICATION_URL_DEV: ${MP_NOTIFICATION_URL_DEV:-https://REPLACE-WITH-YOUR-NGROK-URL.ngrok-free.app/payment-orders/webhook}
      MP_CALLBACK_URL_DEV: ${MP_CALLBACK_URL_DEV:-https://REPLACE-WITH-YOUR-FRONTEND-URL/checkout/pse-return}
    depends_on:
      - postgres
    restart: on-failure

  postgres:
    image: postgres:16
    container_name: docker-payments-postgres
    environment:
      POSTGRES_USER: techcup
      POSTGRES_PASSWORD: techcup
      POSTGRES_DB: techcup_payments
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

name: Payment Service - CI/CD (AKS)

on:
  push:
    branches:
      - main
      - develop
      - "feature_**"

permissions:
  id-token: write
  contents: read

env:
  IMAGE_NAME: ${{ github.repository }}
  ACR_REGISTRY: ${{ secrets.ACR_REGISTRY }}

jobs:
  build-test-analyze:
    name: Build, Test & Analyze
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Cachear paquetes de SonarQube
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Dar permisos al Maven Wrapper
        run: chmod +x mvnw

      - name: Compilar
        run: ./mvnw --batch-mode --no-transfer-progress compile

      - name: Ejecutar pruebas
        run: ./mvnw --batch-mode --no-transfer-progress test

      - name: Publicar reporte de pruebas
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: target/surefire-reports/
          retention-days: 7

      - name: Análisis estático con SonarQube
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          ./mvnw --batch-mode --no-transfer-progress sonar:sonar \
            -Dsonar.projectKey=TECH-CUP-2026-INT_mk-payment-service \
            -Dsonar.organization=tech-cup-2026-int \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

      - name: Empaquetar (jar)
        if: success()
        run: ./mvnw --batch-mode --no-transfer-progress package -DskipTests

      - name: Publicar artefacto JAR
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: payment-service-jar
          path: target/*.jar
          retention-days: 14

  dockerize-publish:
    name: Build & Push Docker Image
    needs: build-test-analyze
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    permissions:
      contents: read
      packages: write
      id-token: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login en Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login en Azure Container Registry
        run: az acr login --name ${{ env.ACR_REGISTRY }}

      - name: Login en GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Calcular metadatos de la imagen
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}
            ghcr.io/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=sha,prefix=,format=short

      - name: Construir y publicar imagen Docker
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-qa:
    name: Deploy QA (AKS)
    needs: dockerize-publish
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    environment: qa
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Login en Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Obtener credenciales AKS
        uses: azure/aks-set-context@v4
        with:
          resource-group: ${{ secrets.AKS_RESOURCE_GROUP_QA }}
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME_QA }}
          admin: "false"
          use-kubelogin: "true"

      - name: Actualizar imagen en manifiestos Kustomize
        run: |
          cd k8s/overlays/qa
          kustomize edit set image \
            ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}=${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Desplegar en AKS QA
        uses: azure/k8s-deploy@v5
        with:
          namespace: payments
          manifests: |
            k8s/base/namespace.yaml
            k8s/base/configmap.yaml
            k8s/base/secret-provider-class.yaml
            k8s/base/service-account.yaml
            k8s/base/deployment.yaml
            k8s/base/service.yaml
            k8s/base/hpa.yaml
            k8s/base/pdb.yaml
            k8s/base/service-monitor.yaml
            k8s/base/pod-monitor.yaml
            k8s/base/ingress.yaml
          images: ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          strategy: rolling

  deploy-prod:
    name: Deploy PROD (AKS)
    needs: dockerize-publish
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Login en Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Obtener credenciales AKS
        uses: azure/aks-set-context@v4
        with:
          resource-group: ${{ secrets.AKS_RESOURCE_GROUP_PROD }}
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME_PROD }}
          admin: "false"
          use-kubelogin: "true"

      - name: Actualizar imagen en manifiestos Kustomize
        run: |
          cd k8s/overlays/prod
          kustomize edit set image \
            ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}=${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Desplegar en AKS PROD
        uses: azure/k8s-deploy@v5
        with:
          namespace: payments
          manifests: |
            k8s/base/namespace.yaml
            k8s/base/configmap.yaml
            k8s/base/secret-provider-class.yaml
            k8s/base/service-account.yaml
            k8s/base/deployment.yaml
            k8s/base/service.yaml
            k8s/base/hpa.yaml
            k8s/base/pdb.yaml
            k8s/base/service-monitor.yaml
            k8s/base/pod-monitor.yaml
            k8s/base/ingress.yaml
          images: ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          strategy: rolling

apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments-api
  namespace: payments
  labels:
    app: payments-api
    app.kubernetes.io/part-of: techcup
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: payments-api
  template:
    metadata:
      labels:
        app: payments-api
        app.kubernetes.io/part-of: techcup
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      serviceAccountName: payments-api-sa
      imagePullSecrets:
        - name: ghcr-secret
      terminationGracePeriodSeconds: 30
      containers:
        - name: payments-api
          image: ghcr.io/tech-cup-2026-int/mk-payment-service:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: SERVICE_NAME
              value: payments-api
            - name: ENVIRONMENT
              value: qa
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: payments-api-config
                  key: spring.profiles.active
            - name: PAYMENT_ORDER_EXPIRATION_MINUTES
              valueFrom:
                configMapKeyRef:
                  name: payments-api-config
                  key: payment-order.expiration-minutes
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: payments-api-secrets
                  key: spring.datasource.url
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: payments-api-secrets
                  key: spring.datasource.username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: payments-api-secrets
                  key: spring.datasource.password
            - name: MP_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: payments-api-secrets
                  key: mercadopago.access-token
            - name: MP_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: payments-api-secrets
                  key: mercadopago.public-key
            - name: MP_NOTIFICATION_URL
              valueFrom:
                secretKeyRef:
                  name: payments-api-secrets
                  key: mercadopago.notification-url
            - name: MP_CALLBACK_URL
              valueFrom:
                secretKeyRef:
                  name: payments-api-secrets
                  key: mercadopago.callback-url
            - name: OTEL_SERVICE_NAME
              value: payments-api
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: deployment.environment=${ENVIRONMENT},service.namespace=payments
            - name: APPLICATIONINSIGHTS_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: observability-secrets
                  key: application-insights-connection-string
          envFrom:
            - configMapRef:
                name: payments-api-config
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1001
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: payments-api
                topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: payments-api

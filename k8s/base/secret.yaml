apiVersion: v1
kind: Secret
metadata:
  name: payments-api-secrets
  namespace: payments
type: Opaque
stringData:
  # Values come from Azure Key Vault via CSI Secrets Store at deploy time
  spring.datasource.url: ${SPRING_DATASOURCE_URL}
  spring.datasource.username: ${SPRING_DATASOURCE_USERNAME}
  spring.datasource.password: ${SPRING_DATASOURCE_PASSWORD}
  mercadopago.access-token: ${MP_ACCESS_TOKEN}
  mercadopago.public-key: ${MP_PUBLIC_KEY}
  mercadopago.notification-url: ${MP_NOTIFICATION_URL}
  mercadopago.callback-url: ${MP_CALLBACK_URL}

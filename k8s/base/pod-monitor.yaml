apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: payments-api-pod-monitor
  namespace: payments
  labels:
    app: payments-api
    azure-monitor: prometheus
    release: ama-metrics
spec:
  selector:
    matchLabels:
      app: payments-api
  namespaceSelector:
    matchNames:
      - payments
  podMetricsEndpoints:
    - port: http
      path: /actuator/prometheus
      interval: 30s
      scrapeTimeout: 10s

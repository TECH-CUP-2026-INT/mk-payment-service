apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: payments-api-monitor
  namespace: payments
  labels:
    app: payments-api
    release: monitoring
spec:
  selector:
    matchLabels:
      app: payments-api
  namespaceSelector:
    matchNames:
      - payments
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 30s
      scrapeTimeout: 10s
      honorLabels: true

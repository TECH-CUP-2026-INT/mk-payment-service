spring:
  application:
    name: payment
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  data:
    mongodb:
      uuid-representation: standard
      auto-index-creation: true

payment-order:
  expiration-minutes: 60

mercadopago:
  base-url: https://api.mercadopago.com
  connect-timeout-millis: 3000
  read-timeout-millis: 5000
